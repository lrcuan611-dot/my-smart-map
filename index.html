<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>我的智能导图助手</title>
  <style>
    :root { --bg: #f0f9f0; --sidebar: #ffffff; --primary: #2e7d32; --accent: #81c784; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* 左侧历史列表 */
    #history-sidebar {
      width: 220px;
      background: var(--sidebar);
      border-right: 1px solid #c8e6c9;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    .history-header { padding: 20px; border-bottom: 1px solid #e8f5e9; }
    #history-list { flex: 1; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
    .history-item {
      padding: 12px 15px;
      cursor: pointer;
      border-bottom: 1px solid #f1f8e9;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }
    .history-item:hover { background: #f1f8e9; }
    .history-item.active { background: #e8f5e9; border-left: 5px solid var(--primary); font-weight: bold; }
    .delete-btn { color: #ccc; font-size: 18px; opacity: 0; transition: 0.2s; }
    .history-item:hover .delete-btn { opacity: 1; }

    /* 编辑区：行号 + textarea */
    #editor-container {
      width: 35%;
      background: #fff;
      border-right: 1px solid #c8e6c9;
      display: flex;
      position: relative;
      min-width: 320px;
    }
    #line-numbers {
      width: 74px;
      background: #fafafa;
      border-right: 1px solid #eee;
      padding: 20px 8px 20px 10px;
      text-align: right;
      color: #999;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.6;
      user-select: none;
      overflow: hidden;
      white-space: pre;
      box-sizing: border-box;
    }
    textarea {
      flex: 1;
      padding: 20px 16px;
      border: 0;
      outline: none;
      resize: none;
      font-size: 15px;
      line-height: 1.6;
      color: #2e3b2e;
      font-family: Consolas, "Courier New", monospace;
      tab-size: 2;
      overflow: auto;
      box-sizing: border-box;
    }

    /* 右侧导图区 */
    #viewer { flex: 1; background: var(--bg); position: relative; }
    #viewer svg { width: 100%; height: 100%; }

    .controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 5;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .btn-new { background: var(--primary); color: white; width: 100%; }
    .btn-tool { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }

    /* 节点旁按钮样式（foreignObject 内 HTML） */
    .mm-node-action-btn {
      font-size: 11px;
      line-height: 1;
      padding: 2px 6px;
      border: 1px solid #81c784;
      border-radius: 4px;
      background: #fff;
      color: #2e7d32;
      cursor: pointer;
    }
    .mm-node-action-btn:hover {
      background: #f1f8e9;
    }
  </style>
</head>
<body>
  <div id="history-sidebar">
    <div class="history-header">
      <button class="btn btn-new" onclick="createNew()">+ 开启新任务</button>
    </div>
    <ul id="history-list"></ul>
  </div>

  <div id="editor-container">
    <div id="line-numbers"></div>
    <textarea id="md" placeholder="输入内容...&#10;按回车自动对齐缩进&#10;空格决定分支层级"></textarea>
  </div>

  <div id="viewer">
    <svg id="markmap"></svg>
    <div class="controls">
      <button class="btn btn-tool" onclick="mm && mm.fit()">🔍 自适应视角</button>
      <button class="btn btn-tool" onclick="downloadImage()">📸 保存截图</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-view"></script>
  <script src="https://cdn.jsdelivr.net/npm/markmap-lib"></script>

  <script>
    const { Transformer, Markmap } = window.markmap;
    const transformer = new Transformer();

    const mdEl = document.getElementById('md');
    const lineNoEl = document.getElementById('line-numbers');

    let mm = null;
    let currentId = null;
    let maps = JSON.parse(localStorage.getItem('my_maps') || '[]');

    function saveToLocal() {
      localStorage.setItem('my_maps', JSON.stringify(maps));
    }

    // 回车自动继承当前行缩进
    mdEl.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;

      const start = mdEl.selectionStart;
      const end = mdEl.selectionEnd;
      const text = mdEl.value;

      const lineStart = text.lastIndexOf('\n', start - 1) + 1;
      const currentLine = text.slice(lineStart, start);
      const indent = (currentLine.match(/^\s*/) || [''])[0];

      e.preventDefault();
      mdEl.setRangeText('\n' + indent, start, end, 'end');
      render();
    });

    // 行号：按缩进层级编号（1 / 1.1 / 2 ...）
    function updateLineNumbers(text) {
      const lines = text.split('\n');
      const counters = [];
      const out = [];

      for (const line of lines) {
        const content = line.trim();
        if (!content) {
          out.push('');
          continue;
        }

        const indent = (line.match(/^\s*/) || [''])[0].length;
        const level = Math.floor(indent / 2);

        counters[level] = (counters[level] || 0) + 1;
        counters.length = level + 1;

        out.push(counters.join('.'));
      }

      lineNoEl.textContent = out.join('\n');
    }

    function formatText(text) {
      return text.split('\n').map(line => {
        const indent = (line.match(/^\s*/) || [''])[0].length;
        const content = line.trim();
        if (!content) return '';
        return '#'.repeat(Math.floor(indent / 2) + 1) + ' ' + content;
      }).join('\n');
    }

    function getLineMeta(text) {
      return text.split('\n').map((line, idx) => {
        const indent = (line.match(/^\s*/) || [''])[0].length;
        return {
          lineNumber: idx + 1,  // 1-based
          indent,
          level: Math.floor(indent / 2),
          content: line.trim()
        };
      });
    }

    function getNodeContent(d) {
      return (
        d?.data?.content ??
        d?.content ??
        d?.payload?.data?.content ??
        ''
      );
    }

    function getNodeDepth(d) {
      return (
        d?.depth ??
        d?.data?.depth ??
        d?.payload?.depth ??
        0
      );
    }

    function buildLinePoolByKey(rawText) {
      const pool = new Map();
      const meta = getLineMeta(rawText);

      meta.forEach(item => {
        if (!item.content) return;
        const key = `${item.level}||${item.content}`;
        if (!pool.has(key)) pool.set(key, []);
        pool.get(key).push(item);
      });

      return pool;
    }

    // 在指定行下方插入新行，并触发重渲染 + 自动保存
    function insertLineBelow(baseLineNumber, indentSpaces) {
      const lines = mdEl.value.split('\n');
      const safeLine = Math.max(1, Math.min(baseLineNumber, lines.length));
      const insertAt = safeLine; // 插在当前行后面
      const newLine = ' '.repeat(Math.max(0, indentSpaces));

      lines.splice(insertAt, 0, newLine);
      mdEl.value = lines.join('\n');

      // 把光标放到新插入行末尾
      let pos = 0;
      for (let i = 0; i < insertAt; i++) pos += lines[i].length + 1;
      pos += newLine.length;
      mdEl.focus();
      mdEl.selectionStart = mdEl.selectionEnd = pos;

      render();
    }

    // 给每个节点挂“+子 / +同”按钮
    function mountNodeActionButtons(rawText) {
      if (!mm) return;

      const svg = d3.select('#markmap');
      svg.selectAll('.mm-inline-actions').remove();

      const linePool = buildLinePoolByKey(rawText);
      const consumeIndex = new Map();

      // 兼容不同版本 markmap 的节点类名
      const nodes = svg.selectAll('g.markmap-node, g.node');

      nodes.each(function(d) {
        const content = String(getNodeContent(d)).trim();
        if (!content) return;

        const depth = getNodeDepth(d);
        const key = `${depth}||${content}`;
        const list = linePool.get(key) || [];
        const idx = consumeIndex.get(key) || 0;
        const picked = list[idx] || null;
        consumeIndex.set(key, idx + 1);

        if (!picked) return;

        const g = d3.select(this);
        const fo = g.append('foreignObject')
          .attr('class', 'mm-inline-actions')
          .attr('x', 10)
          .attr('y', -11)
          .attr('width', 86)
          .attr('height', 24);

        const host = fo.append('xhtml:div')
          .style('display', 'flex')
          .style('gap', '4px')
          .style('pointer-events', 'all');

        const addBtn = (label, onClick) => {
          const btn = host.append('xhtml:button')
            .attr('class', 'mm-node-action-btn')
            .text(label);

          btn.on('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            onClick();
          });
        };

        // 子节点：下方插入，缩进 +2
        addBtn('+子', () => {
          // 可在控制台查看对应行号
          console.log('child insert from line:', picked.lineNumber);
          insertLineBelow(picked.lineNumber, picked.indent + 2);
        });

        // 同级节点：下方插入，缩进不变
        addBtn('+同', () => {
          console.log('sibling insert from line:', picked.lineNumber);
          insertLineBelow(picked.lineNumber, picked.indent);
        });
      });
    }

    function render() {
      const rawText = mdEl.value;
      updateLineNumbers(rawText);

      const markdown = formatText(rawText || '新任务');
      const { root } = transformer.transform(markdown);

      if (!mm) {
        mm = Markmap.create('#markmap', { autoFit: true }, root);
      } else {
        mm.setData(root);
        mm.fit();
      }

      // 等本轮节点绘制完成后再挂按钮
      requestAnimationFrame(() => mountNodeActionButtons(rawText));

      // 自动保存 + 历史刷新（保留原逻辑）
      if (currentId) {
        const target = maps.find(m => m.id === currentId);
        if (target) {
          target.content = rawText;
          target.title = rawText.split('\n')[0].substring(0, 12) || '未命名任务';
          saveToLocal();
          refreshList();
        }
      }
    }

    function createNew() {
      const newMap = { id: Date.now(), title: '新任务', content: '' };
      maps.unshift(newMap);
      currentId = newMap.id;
      mdEl.value = '';
      saveToLocal();
      refreshList();
      render();
      mdEl.focus();
    }

    function loadMap(id) {
      currentId = id;
      const target = maps.find(m => m.id === id);
      mdEl.value = target ? target.content : '';
      refreshList();
      render();
    }

    function deleteMap(e, id) {
      e.stopPropagation();
      if (!confirm('确定删除吗？')) return;

      maps = maps.filter(m => m.id !== id);
      if (currentId === id) {
        currentId = maps.length > 0 ? maps[0].id : null;
        mdEl.value = currentId ? (maps.find(m => m.id === currentId)?.content || '') : '';
      }

      saveToLocal();
      refreshList();
      render();
    }

    function refreshList() {
      const listEl = document.getElementById('history-list');
      listEl.innerHTML = maps.map(m => `
        <li class="history-item ${m.id === currentId ? 'active' : ''}" onclick="loadMap(${m.id})">
          <span>${m.title}</span>
          <span class="delete-btn" onclick="deleteMap(event, ${m.id})">×</span>
        </li>
      `).join('');
    }

    function downloadImage() {
      alert("提示：请使用浏览器的‘打印’功能保存为PDF，或使用截图工具。");
    }

    mdEl.addEventListener('input', render);
    mdEl.addEventListener('scroll', () => {
      lineNoEl.scrollTop = mdEl.scrollTop;
    });

    window.onload = () => {
      if (maps.length === 0) createNew();
      else loadMap(maps[0].id);
    };
  </script>
</body>
</html>
