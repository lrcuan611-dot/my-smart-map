<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lrc_sakura 的个人空间</title>
    <style>
        :root { --bg: #e8f0e8; --primary: #5c8d89; --shadow-light: #ffffff; --shadow-dark: #c3d0c3; --text-main: #4a5c4a; --danger: #ff4d4d; }
        body { background-color: var(--bg); margin: 0; font-family: "PingFang SC", sans-serif; color: var(--text-main); }
        .app-container { display: flex; min-height: 100vh; max-width: 1400px; margin: 0 auto; padding: 20px; gap: 20px; box-sizing: border-box; }
        .neu-card { background: var(--bg); border-radius: 20px; box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light); padding: 20px; position: relative; }
        .neu-btn { background: var(--bg); border: none; border-radius: 12px; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); padding: 10px 20px; color: var(--primary); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .neu-btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }

        /* 侧边栏 */
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 10px; background: url('https://api.dicebear.com/7.x/notionists/svg?seed=sakura') center/cover; border: 4px solid var(--bg); box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
        .nav-menu { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
        .nav-menu li { cursor: pointer; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; transition: 0.3s; }
        .nav-menu li.active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); color: var(--primary); }

        /* 主内容 */
        .main-content { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .page-section { display: none; animation: fadeIn 0.4s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 时钟与日历 */
        .clock-card { height: 260px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: url('https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=800') center/cover; border-radius: 25px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .time-text { font-size: 4rem; font-weight: 900; z-index: 1; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 15px; }
        .cal-day { padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light); }

        /* 相册区 (核心升级) */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 20px; }
        .photo-container { position: relative; width: 100%; aspect-ratio: 1; border-radius: 15px; overflow: visible; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); }
        .photo-img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; border: 4px solid var(--bg); cursor: zoom-in; display: block; }
        .photo-del-btn { 
            position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; 
            background: var(--danger); color: white; border-radius: 50%; border: 2px solid var(--bg);
            display: flex; align-items: center; justify-content: center; font-size: 14px; 
            cursor: pointer; z-index: 10; font-weight: bold; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        .upload-placeholder { height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed var(--primary); color: var(--primary); cursor: pointer; border-radius: 15px; }

        /* 查看器 */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }

        /* 文章双栏 */
        .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .text-area { width: 100%; height: 400px; padding: 15px; border-radius: 15px; border: none; background: var(--bg); box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); outline: none; font-size: 16px; line-height: 1.6; box-sizing: border-box; }
        .readonly { background: rgba(255,255,255,0.3); color: #666; }

        @media (max-width: 800px) { .app-container { flex-direction: column; } .sidebar { width: 100%; } .split-view { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="neu-card sidebar">
        <div style="text-align:center;">
            <div class="avatar"></div>
            <h2 style="margin:5px 0;">Lrc_sakura</h2>
            <p style="font-size:12px; color:#888;">日语学习 & 乡村生活</p>
        </div>
        <ul class="nav-menu">
            <li class="active" onclick="switchPage('page-home')" id="nav-home">🏠 主页空间</li>
            <li onclick="switchPage('page-list')" id="nav-list">📖 文章专栏</li>
            <li onclick="switchPage('page-album')" id="nav-album">📷 我的相册</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="page-home" class="page-section active">
            <div class="neu-card clock-card" id="main-clock">
                <div class="time-text" id="time-display">00:00</div>
                <div style="position:relative; z-index:1; font-weight:bold;">2026年3月24日</div>
                <button class="neu-btn" style="position:absolute; bottom:15px; right:15px; font-size:12px;" onclick="document.getElementById('clock-bg-input').click()">📷 更换皮肤</button>
                <input type="file" id="clock-bg-input" hidden onchange="changeClockBg(this)">
            </div>
            <div class="neu-card" style="margin-top:20px;">
                <h3>📅 日历日程</h3>
                <div class="cal-grid" id="cal-grid"></div>
            </div>
        </div>

        <div id="page-list" class="page-section neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2>文章专栏</h2>
                <button class="neu-btn" onclick="openUploadModal()">➕ 发布新文章</button>
            </div>
            <div id="article-items">
                <div class="neu-card" id="art-1" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <div style="cursor:pointer; flex:1;" onclick="readArticle('商务邮件练习', '内容示例...', 'art-1')">
                        <div style="font-size:0.8rem; color:#888;">2026-03-24</div>
                        <div style="font-weight:bold; font-size:1.1rem;">关于会议延期的请求</div>
                    </div>
                    <button class="neu-btn" style="color:red; font-size:12px;" onclick="document.getElementById('art-1').remove()">删除</button>
                </div>
            </div>
        </div>

        <div id="page-read" class="page-section neu-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <button class="neu-btn" onclick="switchPage('page-list')">⬅ 返回列表</button>
                <button class="neu-btn" onclick="enableCorrection()">✍ 我要修改</button>
            </div>
            <h2 id="read-title" style="text-align:center;"></h2>
            <div id="article-layout"><textarea class="text-area readonly" id="read-content" readonly></textarea></div>
            <div id="split-layout" class="split-view" style="display:none;">
                <div><p>原文</p><textarea class="text-area readonly" id="split-original" readonly></textarea></div>
                <div><p>修改区</p><textarea class="text-area" id="split-edit"></textarea></div>
            </div>
        </div>

        <div id="page-album" class="page-section neu-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>我的相册</h2>
                <button class="neu-btn" onclick="document.getElementById('album-input').click()">➕ 上传照片</button>
                <input type="file" id="album-input" hidden multiple accept="image/*" onchange="addPhotos(this)">
            </div>
            <div class="photo-grid" id="photo-display">
                <div class="upload-placeholder" onclick="document.getElementById('album-input').click()">
                    <span style="font-size:30px;">+</span>
                    <span>点击上传照片</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>

<script>
    // 基础导航
    function switchPage(pid) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-menu li').forEach(l => l.classList.remove('active'));
        document.getElementById(pid).classList.add('active');
        const navMap = {'page-home':'nav-home', 'page-list':'nav-list', 'page-album':'nav-album', 'page-read':'nav-list'};
        document.getElementById(navMap[pid]).classList.add('active');
    }

    // 时钟
    setInterval(() => {
        const now = new Date();
        document.getElementById('time-display').innerText = now.toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit'});
    }, 1000);

    // 换皮肤
    function changeClockBg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('main-clock').style.backgroundImage = `url(${e.target.result})`;
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 日历生成
    const grid = document.getElementById('cal-grid');
    for(let i=1; i<=31; i++) {
        const d = document.createElement('div');
        d.className = 'cal-day'; d.innerText = i;
        d.onclick = () => alert(`3月${i}日日程：暂无记录`);
        grid.appendChild(d);
    }

    // --- 相册逻辑 (删除功能加入) ---
    function addPhotos(input) {
        if (input.files) {
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const container = document.createElement('div');
                    container.className = 'photo-container';
                    
                    // 创建删除按钮
                    const delBtn = document.createElement('div');
                    delBtn.className = 'photo-del-btn';
                    delBtn.innerHTML = '×';
                    delBtn.title = '删除照片';
                    delBtn.onclick = (event) => {
                        event.stopPropagation(); // 防止触发放大查看
                        if(confirm('确定删除这张照片吗？')) container.remove();
                    };

                    // 创建图片
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'photo-img';
                    img.onclick = () => openLightbox(e.target.result);

                    container.appendChild(delBtn);
                    container.appendChild(img);
                    document.getElementById('photo-display').prepend(container);
                };
                reader.readAsDataURL(file);
            });
        }
    }

    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').style.display = 'flex';
    }

    // 文章逻辑
    function readArticle(t, c) {
        document.getElementById('read-title').innerText = t;
        document.getElementById('read-content').value = c;
        document.getElementById('article-layout').style.display = 'block';
        document.getElementById('split-layout').style.display = 'none';
        switchPage('page-read');
    }

    function enableCorrection() {
        const c = document.getElementById('read-content').value;
        document.getElementById('article-layout').style.display = 'none';
        document.getElementById('split-layout').style.display = 'grid';
        document.getElementById('split-original').value = c;
        document.getElementById('split-edit').value = c;
    }
</script>

</body>
</html>
